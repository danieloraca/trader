[bot]
symbol = "BTC-USD"
base_currency = "BTC"
quote_currency = "USD"
paper_starting_quote_balance = 10000.0

[exchange]
kind = "paper"

[exchange.kraken]
base_url = "https://api.kraken.com"
pair = "XBTUSD"
api_key_env = "KRAKEN_API_KEY"
api_secret_env = "KRAKEN_API_SECRET"
enable_order_placement = false

[market_data]
kind = "kraken_ticker"
replay_prices = []
idle_sleep_ms = 1000

[market_data.kraken]
base_url = "https://api.kraken.com"
pair = "XBTUSD"
poll_interval_ms = 5000

[risk]
max_order_quote_value = 500.0
max_position_base = 0.25

[strategy]
kind = "simple_momentum"

[strategy.simple_momentum]
buy_threshold_bps = 50
sell_threshold_bps = -100
buy_quantity_base = 0.01
sell_quantity_base = 0.005

[strategy.moving_average_crossover]
fast_window = 5
slow_window = 20
quantity_base = 0.001

[storage]
sqlite_path = "/var/lib/trader/trader.sqlite"

[telemetry]
verbose = false
